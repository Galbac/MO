version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: uvicorn source.main:create_app --factory --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env.template
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tennis_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
