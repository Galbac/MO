      summary: Титулы игрока
      responses:
        "200":
          description: Титулы игрока
  /players/{player_id}/news:
    get:
      tags: [Players]
      summary: Новости игрока
      responses:
        "200":
          description: Новости игрока
  /players/{player_id}/upcoming-matches:
    get:
      tags: [Players]
      summary: Ближайшие матчи игрока
      responses:
        "200":
          description: Ближайшие матчи
  /tournaments:
    get:
      tags: [Tournaments]
      summary: Список турниров
      responses:
        "200":
          description: Список турниров
  /tournaments/calendar:
    get:
      tags: [Tournaments]
