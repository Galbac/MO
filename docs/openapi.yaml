components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [email, username, password]
      properties:
        email:
          type: string
          format: email
        username:
          type: string
        password:
          type: string
          minLength: 8
        locale:
          type: string
        timezone:
          type: string
    LoginRequest:
      type: object
      required: [email_or_username, password]
      properties:
        email_or_username:
          type: string
        password:
          type: string
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        username:
          type: string
        role:
          type: string
        status:
          type: string
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        locale:
          type: string
        timezone:
          type: string
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            access_token:
              type: string
            refresh_token:
              type: string
            user:
              $ref: "#/components/schemas/User"
        meta:
          type: object
        errors:
          type: "null"
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          type: "null"
        meta:
          type: object
        errors:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              message:
                type: string
              field:
                type: string
