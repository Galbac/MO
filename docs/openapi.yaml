      tags: [Players]
      summary: Личные встречи
      responses:
        "200":
          description: H2H игроков
  /players/{player_id}:
    get:
      tags: [Players]
      summary: Карточка игрока
      responses:
        "200":
          description: Игрок найден
  /players/{player_id}/stats:
    get:
      tags: [Players]
      summary: Статистика игрока
      responses:
        "200":
          description: Статистика игрока
  /players/{player_id}/matches:
    get:
      tags: [Players]
      summary: Матчи игрока
      responses:
        "200":
          description: Матчи игрока
  /players/{player_id}/ranking-history:
    get:
      tags: [Players]
      summary: История рейтинга игрока
      responses:
        "200":
          description: История рейтинга
  /players/{player_id}/titles:
    get:
