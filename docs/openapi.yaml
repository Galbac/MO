openapi: 3.1.0
info:
  title: Tennis Portal API
  version: 1.0.0
  description: API для теннисного спортивного портала на FastAPI.
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: Users
  - name: Players
  - name: Tournaments
  - name: Matches
  - name: Live
  - name: Rankings
  - name: News
  - name: Search
  - name: Notifications
  - name: Media
  - name: Admin Users
  - name: Admin Players
  - name: Admin Tournaments
  - name: Admin Matches
  - name: Admin Rankings
  - name: Admin News
  - name: Admin Taxonomy
  - name: Admin Integrations
  - name: Admin Audit
paths:
  /health:
    get:
      tags: [Auth]
      summary: Healthcheck
      responses:
        "200":
          description: Service healthy
  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Пользователь зарегистрирован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/login:
    post:
      tags: [Auth]
      summary: Авторизация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Обновление access token
      responses:
        "200":
          description: Токен обновлен
  /auth/logout:
    post:
      tags: [Auth]
      summary: Выход пользователя
      responses:
        "200":
          description: Выход выполнен
  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Запрос на сброс пароля
      responses:
        "200":
          description: Заявка принята
  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Сброс пароля
      responses:
        "200":
          description: Пароль изменен
  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Подтверждение email
      responses:
        "200":
          description: Email подтвержден
  /auth/me:
    get:
      tags: [Auth]
      summary: Текущий пользователь
      responses:
        "200":
          description: Профиль пользователя
  /users/me:
    get:
      tags: [Users]
      summary: Профиль пользователя
      responses:
        "200":
          description: Профиль пользователя
    patch:
      tags: [Users]
      summary: Обновление профиля
      responses:
        "200":
          description: Профиль обновлен
  /users/me/password:
    patch:
      tags: [Users]
      summary: Смена пароля
      responses:
        "200":
          description: Пароль изменен
  /users/me/favorites:
    get:
      tags: [Users]
      summary: Избранное пользователя
      responses:
        "200":
          description: Список избранного
    post:
      tags: [Users]
      summary: Добавление в избранное
      responses:
        "200":
          description: Сущность добавлена в избранное
  /users/me/favorites/{favorite_id}:
    delete:
      tags: [Users]
      summary: Удаление из избранного
      responses:
        "200":
          description: Избранное удалено
  /users/me/subscriptions:
    get:
      tags: [Users]
      summary: Подписки пользователя
      responses:
        "200":
          description: Список подписок
    post:
      tags: [Users]
      summary: Создание подписки
      responses:
        "200":
          description: Подписка создана
  /users/me/subscriptions/{subscription_id}:
    patch:
      tags: [Users]
      summary: Обновление подписки
      responses:
        "200":
          description: Подписка обновлена
    delete:
      tags: [Users]
      summary: Удаление подписки
      responses:
        "200":
          description: Подписка удалена
  /users/me/notifications:
    get:
      tags: [Users]
      summary: Уведомления пользователя
      responses:
        "200":
          description: Список уведомлений
  /users/me/notifications/{notification_id}/read:
    patch:
      tags: [Users]
      summary: Отметить уведомление прочитанным
      responses:
        "200":
          description: Уведомление прочитано
  /users/me/notifications/read-all:
    patch:
      tags: [Users]
      summary: Отметить все уведомления прочитанными
      responses:
        "200":
          description: Все уведомления прочитаны
  /players:
    get:
      tags: [Players]
      summary: Список игроков
      responses:
        "200":
          description: Список игроков
  /players/compare:
    get:
      tags: [Players]
      summary: Сравнение игроков
      responses:
        "200":
          description: Данные сравнения
  /players/h2h:
