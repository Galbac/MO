{% extends "admin/base.html" %}
{% block content %}
<section class="admin-page-header hero-card">
    <div class="section-kicker">Audit logs</div>
    <h1 class="hero-title mt-3">Аудит критических действий пользователей и операторов.</h1>
</section>

<section class="page-section content-card">
    <form id="admin-audit-filters" class="admin-form-grid">
        <input class="form-control span-3" id="audit-user-id" placeholder="User ID">
        <input class="form-control span-3" id="audit-entity-type" placeholder="Entity type">
        <input class="form-control span-3" id="audit-action" placeholder="Action">
        <input class="form-control span-3" id="audit-date-from" placeholder="Date from">
        <input class="form-control span-3" id="audit-date-to" placeholder="Date to">
        <button class="btn btn-ghost-dark span-3" id="admin-audit-reset" type="button">Сброс</button>
    </form>
    <div id="admin-audit-summary"></div>
</section>

<section class="page-section table-card">
    <div class="table-responsive">
        <table class="table table-clean" aria-label="Таблица аудита">
            <thead><tr><th>Action</th><th>Entity</th><th>User</th><th>Created</th></tr></thead>
            <tbody id="admin-audit-body"></tbody>
        </table>
    </div>
</section>

<section class="page-section content-card">
    <div class="section-kicker">Audit detail</div>
    <h2 class="section-title mt-2 mb-3">Детали записи</h2>
    <div id="admin-audit-detail"></div>
</section>
{% endblock %}
