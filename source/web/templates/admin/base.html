<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title | default("Tennis Portal Admin Layout") }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url | default('') }}">
</head>
<body data-page="{{ page_name | default('admin-base') }}">
    <div class="admin-shell">
        <aside class="admin-sidebar">
            <a href="/admin" class="brand-mark mb-4"><span class="brand-ball">TP</span><span>Admin</span></a>
            <nav class="admin-nav">
                <a href="/admin">Dashboard</a>
                <a href="/admin/users">Users</a>
                <a href="/admin/players">Players</a>
                <a href="/admin/tournaments">Tournaments</a>
                <a href="/admin/matches">Matches</a>
                <a href="/admin/news">News</a>
            </nav>
        </aside>
        <main class="admin-main">
            <header class="admin-header">
                <div class="eyebrow">Admin Layout</div>
                <h1 class="section-title mb-0">Reusable admin shell</h1>
            </header>
        </main>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
