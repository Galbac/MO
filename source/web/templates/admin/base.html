<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title | default("Админка Makhachkala Open") }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url | default('') }}">
</head>
<body data-page="{{ page_name | default('admin-base') }}">
    <a class="visually-hidden-focusable skip-link" href="#admin-main-content">Перейти к содержимому админки</a>
    <div class="admin-shell">
        <aside class="admin-sidebar" aria-label="Боковая панель админки">
            <a href="/admin" class="brand-mark mb-4"><span class="brand-ball">MO</span><span>Админка</span></a>
            <nav class="admin-nav" aria-label="Навигация админки">
                <a href="/admin">Панель</a>
                <a href="/admin/users">Пользователи</a>
                <a href="/admin/players">Игроки</a>
                <a href="/admin/tournaments">Турниры</a>
                <a href="/admin/matches">Матчи</a>
                <a href="/admin/news">Новости</a>
            </nav>
        </aside>
        <main id="admin-main-content" class="admin-main" role="main" tabindex="-1">
            <header class="admin-header" role="banner">
                <div class="eyebrow">Админка</div>
                <h1 class="section-title mb-0">Базовый шаблон админки</h1>
            </header>
        </main>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
