<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
</head>
<body data-page="{{ page_name }}">
<a class="visually-hidden-focusable skip-link" href="#admin-main-content">Перейти к содержимому админки</a>
<div class="admin-shell">
    <aside class="admin-sidebar" aria-label="Боковая панель админки"><a href="/admin" class="brand-mark mb-4"><span class="brand-ball">MO</span><span>Админка</span></a><nav class="admin-nav" aria-label="Навигация админки"><a href="/admin/jobs" class="active">Очередь задач</a><a href="/admin/rankings">Рейтинги</a><a href="/admin/audit">Аудит</a></nav></aside>
    <main class="admin-main" id="admin-main-content" role="main" tabindex="-1">
        <header class="admin-header"><div class="eyebrow">Job Queue</div><h1 class="section-title">Управление отложенными задачами, retry и очисткой завершенных записей.</h1></header>
        <section class="entity-card mb-4" aria-label="Операции очереди задач">
            <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-success" type="button" id="admin-jobs-process">Обработать pending</button>
                <button class="btn btn-outline-dark" type="button" id="admin-jobs-prune">Очистить finished/failed</button>
                <div class="success-note d-none" id="admin-jobs-feedback">Операция выполнена.</div>
                <div class="error-note d-none" id="admin-jobs-error">Операция завершилась ошибкой.</div>
            </div>
        </section>
        <section class="empty-state d-none mb-4" id="admin-jobs-empty">Очередь задач сейчас пуста.</section><section class="table-shell"><table class="table table-clean" aria-label="Таблица очереди задач"><thead><tr><th>ID</th><th>Type</th><th>Status</th><th>Run At</th><th>Attempts</th><th>Error</th><th>Action</th></tr></thead><tbody id="admin-jobs-body"></tbody></table></section>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
