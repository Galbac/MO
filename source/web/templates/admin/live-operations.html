{% extends "admin/base.html" %}
{% block content %}
<section class="admin-page-header hero-card">
    <div class="section-kicker">Лайв-операции</div>
    <h1 class="hero-title mt-3">Ручное управление лайв-центром, событиями и обновлениями счета.</h1>
</section>

<section class="page-section admin-grid two">
    <section class="content-card">
        <div class="section-kicker">Очередь лайва</div>
        <h2 class="section-title mt-2 mb-3">Активные матчи</h2>
        <div class="cards-grid" id="admin-live-matches"></div>
    </section>
    <section class="content-card">
        <div class="section-kicker">Отправка события</div>
        <h2 class="section-title mt-2 mb-3">Быстрое событие</h2>
        <form id="admin-live-event-form" data-api-method="POST">
            <div class="d-grid gap-3">
                <select class="form-select" id="admin-live-match-id"></select>
                <select class="form-select" name="event_type"><option value="point_updated">point_updated</option><option value="break_point">break_point</option><option value="set_finished">set_finished</option></select>
                <input class="form-control" name="set_number" placeholder="Номер сета">
                <button class="btn btn-primary" type="submit">Отправить событие</button>
                <div class="alert alert-success d-none mb-0" data-form-feedback>Событие отправлено.</div>
                <div class="alert alert-danger d-none mb-0" data-form-error>Не удалось отправить событие.</div>
            </div>
        </form>
    </section>
</section>
{% endblock %}
