<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
</head>
<body data-page="{{ page_name }}" data-section="admin">
<main class="admin-login-shell">
    <div class="admin-login-card">
        <section class="admin-login-brand">
            <div class="section-kicker">Admin access</div>
            <h1 class="hero-title mt-3">Вход в редакторский и live-операционный контур.</h1>
            <p class="section-lead mt-3">Логин для редакторов, операторов лайва и администраторов. Интерфейс построен как sports operations room, а не стандартная скучная панель.</p>
        </section>
        <section class="content-card">
            <div class="section-kicker">Secure sign in</div>
            <h2 class="section-title mt-2 mb-4">Авторизация</h2>
            <form data-api-path="/auth/login" data-api-method="POST">
                <div class="d-grid gap-3">
                    <input class="form-control form-control-lg" name="email_or_username" placeholder="Email или username">
                    <input class="form-control form-control-lg" type="password" name="password" placeholder="Пароль">
                    <button class="btn btn-lime btn-lg" type="submit">Войти</button>
                    <div class="alert alert-success d-none mb-0" data-form-feedback>Авторизация выполнена.</div>
                    <div class="alert alert-danger d-none mb-0" data-form-error>Не удалось войти.</div>
                </div>
            </form>
        </section>
    </div>
</main>
<div class="toast-container position-fixed top-0 end-0 p-3" id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/static/js/app.js"></script>
</body>
</html>
