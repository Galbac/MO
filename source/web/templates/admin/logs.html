<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
</head>
<body data-page="{{ page_name }}">
<a class="visually-hidden-focusable skip-link" href="#admin-main-content">Перейти к содержимому админки</a>
<div class="admin-shell">
    <aside class="admin-sidebar" aria-label="Боковая панель админки"><a href="/admin" class="brand-mark mb-4"><span class="brand-ball">MO</span><span>Админка</span></a><nav class="admin-nav" aria-label="Навигация админки"><a href="/admin/logs" class="active">Логи</a><a href="/admin/audit">Аудит</a><a href="/admin/jobs">Очередь задач</a></nav></aside>
    <main class="admin-main" id="admin-main-content" role="main" tabindex="-1">
        <header class="admin-header"><div class="eyebrow">Логи</div><h1 class="section-title">Access, application, worker и integration логи.</h1></header>
        <section class="entity-card mb-4" aria-label="Фильтры логов">
            <form id="admin-logs-filters" class="row g-3 align-items-end">
                <div class="col-md-4"><label class="form-label" for="admin-logs-category">Category</label><select class="form-select" id="admin-logs-category"><option value="application">application</option><option value="access">access</option><option value="worker">worker</option><option value="integration">integration</option></select></div>
                <div class="col-md-3"><label class="form-label" for="admin-logs-level">Level</label><select class="form-select" id="admin-logs-level"><option value="">Все</option><option value="info">info</option><option value="error">error</option></select></div>
                <div class="col-md-3"><label class="form-label" for="admin-logs-limit">Limit</label><input class="form-control" id="admin-logs-limit" value="100" inputmode="numeric"></div>
                <div class="col-md-2 d-grid"><button class="btn btn-outline-secondary" id="admin-logs-reset" type="button">Сброс</button></div>
            </form>
        </section>
        <section class="alert alert-danger d-none" id="admin-logs-error"></section>
        <section class="empty-state d-none mb-4" id="admin-logs-empty">Логи по выбранным параметрам не найдены.</section>
        <section class="content-card"><div id="admin-logs-list"></div></section>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
