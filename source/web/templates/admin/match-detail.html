<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{{ page_title }}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/static/css/app.css"><link rel="canonical" href="{{ canonical_url }}"></head>
<body data-page="{{ page_name }}" data-entity-id="{{ entity_id | default('') }}"><div class="admin-shell"><aside class="admin-sidebar"><a href="/admin" class="brand-mark mb-4"><span class="brand-ball">TP</span><span>Admin</span></a><nav class="admin-nav"><a href="/admin/matches" class="active">Matches</a><a href="/admin/live-operations">Live Ops</a></nav></aside><main class="admin-main"><header class="admin-header"><div class="eyebrow">Match detail/edit</div><h1 class="section-title" id="admin-match-title">Loading match...</h1></header><div class="admin-layout-grid two"><section class="content-card"><h2 class="section-title">Score editor</h2><form data-prevent-double-submit data-api-path="/admin/matches/{{ entity_id }}/score" data-api-method="PATCH"><div class="d-grid gap-3"><input class="form-control" name="score_summary" placeholder="6-4 3-6 7-5"><button class="btn btn-success rounded-pill" type="submit">Save score</button><div class="success-note d-none" data-form-feedback>Match updated.</div><div class="error-note d-none" data-form-error>Request failed.</div></div></form></section><section class="content-card"><h2 class="section-title">Finalize</h2><p class="text-muted">Проверка статуса, фиксация победителя, запуск пересчета stats/H2H/form, аудит и уведомления.</p><button class="btn btn-outline-dark rounded-pill" data-api-action data-api-method="POST" data-api-path="/admin/matches/{{ entity_id }}/finalize" data-target-feedback="match-finalize-feedback">Finalize match</button><div class="success-note d-none mt-3" id="match-finalize-feedback">Match finalized.</div><div class="error-note d-none mt-3" id="match-finalize-error">Request failed.</div></section></div><section class="content-card mt-4"><h2 class="section-title">Timeline events</h2><div id="admin-match-timeline"></div></section></main></div><script src="/static/js/app.js"></script></body></html>
