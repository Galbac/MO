{% extends "admin/base.html" %}
{% block content %}
<section class="admin-page-header content-card d-flex justify-content-between align-items-center gap-3 flex-wrap">
    <div>
        <div class="section-kicker">Matches admin</div>
        <h1 class="section-title mt-2">Матчи и live-статусы</h1>
    </div>
    <a href="/admin/matches/new" class="btn btn-lime">Новый матч</a>
</section>

<section class="page-section content-card">
    <form id="admin-matches-filters" class="admin-form-grid">
        <input class="form-control span-8" id="admin-matches-search" placeholder="Поиск по игрокам или турниру">
        <select class="form-select span-4" id="admin-matches-status"><option value="">Все статусы</option><option value="scheduled">Scheduled</option><option value="live">Live</option><option value="finished">Finished</option></select>
        <input class="form-control span-4" id="admin-matches-tournament" placeholder="Tournament">
        <input class="form-control span-4" id="admin-matches-player" placeholder="Player">
        <input class="form-control span-4" id="admin-matches-round" placeholder="Round">
        <input class="form-control span-4" id="admin-matches-date-from" placeholder="Date from">
        <input class="form-control span-4" id="admin-matches-date-to" placeholder="Date to">
    </form>
</section>

<section class="page-section content-card">
    <div class="section-kicker">Quick create</div>
    <h2 class="section-title mt-2 mb-3">Создать матч</h2>
    <div class="admin-form-grid">
        <input class="form-control span-6" id="admin-match-create-player1" placeholder="Player 1">
        <input class="form-control span-6" id="admin-match-create-player2" placeholder="Player 2">
        <input class="form-control span-6" id="admin-match-create-tournament" placeholder="Tournament">
        <input class="form-control span-3" id="admin-match-create-round" placeholder="Round">
        <input class="form-control span-3" id="admin-match-create-status" placeholder="scheduled">
    </div>
    <div class="d-flex gap-2 mt-4">
        <button class="btn btn-primary" id="admin-match-create" type="button">Создать матч</button>
    </div>
</section>

<section class="page-section table-card">
    <div class="table-responsive">
        <table class="table table-clean" aria-label="Таблица матчей">
            <thead><tr><th>Матч</th><th>Турнир</th><th>Статус</th><th>Раунд</th><th>Действия</th></tr></thead>
            <tbody id="admin-matches-body"></tbody>
        </table>
    </div>
</section>
{% endblock %}
