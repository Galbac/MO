<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{{ page_title }}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/static/css/app.css"><link rel="canonical" href="{{ canonical_url }}"></head>
<body data-page="{{ page_name }}"><div class="admin-shell"><aside class="admin-sidebar"><a href="/admin" class="brand-mark mb-4"><span class="brand-ball">TP</span><span>Admin</span></a><nav class="admin-nav"><a href="/admin/media" class="active">Media</a><a href="/admin/news">News</a><a href="/admin/settings">Settings</a></nav></aside><main class="admin-main"><header class="admin-header"><div class="eyebrow">Media library</div><h1 class="section-title">Uploads, preview and URL copy flow.</h1></header><section class="content-card mb-4"><form data-prevent-double-submit data-api-path="/admin/media/upload" data-api-method="POST"><div class="row g-3"><div class="col-md-5"><input class="form-control" name="filename" placeholder="File name, e.g. cover.jpg" value="cover.jpg"></div><div class="col-md-4"><input class="form-control" name="content_type" placeholder="MIME type" value="image/jpeg"></div><div class="col-md-3"><button class="btn btn-success rounded-pill w-100" type="submit">Upload media</button></div><div class="col-12"><div class="success-note d-none" data-form-feedback>Media uploaded.</div><div class="error-note d-none" data-form-error>Request failed.</div></div></div></form></section><section class="content-card"><div class="section-title h5 mb-3">Library</div><div class="card-grid cols-3" id="admin-media-list"></div></section></main></div><script src="/static/js/app.js"></script></body></html>
