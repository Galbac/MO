{% extends "admin/base.html" %}
{% block content %}
<section class="admin-page-header hero-card">
    <div class="section-kicker">Media library</div>
    <h1 class="hero-title mt-3">Медиатека: управление обложками, фото игроков и медиа-ассетами.</h1>
</section>

<section class="page-section content-card">
    <div id="admin-media-summary" class="admin-note mb-4">Безопасные текстовые значения по умолчанию: <code>note.txt</code> и <code>text/plain</code>.</div>
    <form id="admin-media-filters" class="admin-form-grid mb-4">
        <select class="form-select span-6" id="admin-media-content-type"><option>text/plain</option><option>image/jpeg</option></select>
        <select class="form-select span-6" id="admin-media-exists"><option>Все файлы</option><option>Только существующие</option></select>
    </form>
    <form data-api-path="/media/upload" data-api-method="POST">
        <div class="admin-form-grid">
            <input class="form-control span-6" name="filename" placeholder="Filename" value="note.txt">
            <input class="form-control span-6" name="content_type" placeholder="Content type" value="text/plain">
            <textarea class="form-control span-12" rows="5" name="content" placeholder="Content">Sample text</textarea>
        </div>
        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Добавить в библиотеку</button>
            <div class="alert alert-success d-none mb-0" data-form-feedback>Медиа сохранено.</div>
            <div class="alert alert-danger d-none mb-0" data-form-error>Не удалось сохранить медиа.</div>
        </div>
    </form>
</section>

<div class="alert alert-danger d-none page-section" id="admin-media-error"></div>
<div class="state-card d-none page-section" id="admin-media-empty">Список медиа пока пуст.</div>
<section class="page-section content-card">
    <div class="admin-form-grid">
        <input class="form-control span-8" id="admin-media-id" placeholder="Media ID">
        <button class="btn btn-ghost-dark span-2" id="admin-media-load" type="button">Load</button>
        <button class="btn btn-outline-danger span-2" id="admin-media-delete" type="button">Delete</button>
    </div>
</section>
<section class="page-section content-card" id="admin-media-grid"></section>
{% endblock %}
