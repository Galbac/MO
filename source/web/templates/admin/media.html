<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{{ page_title }}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/static/css/app.css"><link rel="canonical" href="{{ canonical_url }}"></head>
<body data-page="{{ page_name }}"><div class="admin-shell"><aside class="admin-sidebar"><a href="/admin" class="brand-mark mb-4"><span class="brand-ball">MO</span><span>Админка</span></a><nav class="admin-nav"><a href="/admin/media" class="active">Медиа</a><a href="/admin/news">Новости</a><a href="/admin/settings">Настройки</a></nav></aside><main class="admin-main"><header class="admin-header"><div class="eyebrow">Медиатека</div><h1 class="section-title">Загрузка файлов, предпросмотр и получение ссылок.</h1></header><section class="content-card mb-4"><form data-prevent-double-submit data-api-path="/admin/media/upload" data-api-method="POST"><div class="row g-3"><div class="col-md-4"><input class="form-control" name="filename" placeholder="Имя файла, например note.txt" value="note.txt"></div><div class="col-md-3"><input class="form-control" name="content_type" placeholder="MIME-тип" value="text/plain"></div><div class="col-md-5"><textarea class="form-control" name="content" rows="2" placeholder="Содержимое файла">Editorial note</textarea></div><div class="col-md-3"><button class="btn btn-success rounded-pill w-100" type="submit">Загрузить файл</button></div><div class="col-12"><div class="success-note d-none" data-form-feedback>Файл загружен.</div><div class="error-note d-none" data-form-error>Запрос не выполнен.</div></div></div></form></section><section class="content-card"><div class="section-title h5 mb-3">Библиотека</div><div class="alert alert-danger d-none" id="admin-media-error"></div><div class="empty-state d-none" id="admin-media-empty">Медиатека пока пуста.</div><div class="card-grid cols-3" id="admin-media-list"></div></section></main></div><script src="/static/js/app.js"></script></body></html>
