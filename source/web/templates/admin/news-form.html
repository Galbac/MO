<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{{ page_title }}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/static/css/app.css"><link rel="canonical" href="{{ canonical_url }}"></head>
<body data-page="{{ page_name }}"><div class="admin-shell"><aside class="admin-sidebar"><a href="/admin" class="brand-mark mb-4"><span class="brand-ball">TP</span><span>Admin</span></a><nav class="admin-nav"><a href="/admin/news" class="active">News</a></nav></aside><main class="admin-main"><header class="admin-header"><div class="eyebrow">News create/edit</div><h1 class="section-title">Editorial form</h1></header><section class="content-card"><form data-prevent-double-submit data-api-path="/admin/news" data-api-method="POST"><div class="row g-3"><div class="col-12"><input class="form-control" name="slug" placeholder="Slug"></div><div class="col-12"><input class="form-control" name="title" placeholder="Title"></div><div class="col-12"><input class="form-control" name="subtitle" placeholder="Subtitle"></div><div class="col-12"><textarea class="form-control" rows="8" name="content_html" placeholder="Content HTML"></textarea></div><div class="col-md-4"><select class="form-select" name="status"><option value="draft">draft</option><option value="review">review</option><option value="published">published</option></select></div><div class="col-md-4"><input class="form-control" name="seo_title" placeholder="SEO title"></div><div class="col-md-4"><input class="form-control" name="publish_at" placeholder="Publish at"></div><div class="col-12"><button class="btn btn-success rounded-pill" type="submit">Save article</button><div class="success-note d-none mt-3" data-form-feedback>Article saved.</div><div class="error-note d-none mt-3" data-form-error>Request failed.</div></div></div></form></section></main></div><script src="/static/js/app.js"></script></body></html>
