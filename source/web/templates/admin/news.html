{% extends "admin/base.html" %}
{% block content %}
<section class="admin-page-header content-card d-flex justify-content-between align-items-center gap-3 flex-wrap">
    <div>
        <div class="section-kicker">News admin</div>
        <h1 class="section-title mt-2">Редакционный поток и управление публикациями</h1>
    </div>
    <a href="/admin/news/new" class="btn btn-lime">Новая новость</a>
</section>

<section class="page-section content-card">
    <form id="admin-news-filters" class="admin-form-grid">
        <input class="form-control span-8" id="admin-news-search" placeholder="Поиск по новостям">
        <select class="form-select span-4" id="admin-news-status"><option value="">Все статусы</option><option value="draft">Draft</option><option value="published">Published</option></select>
    </form>
    <div class="alert alert-success d-none mt-3 mb-0" id="admin-news-feedback">Операция выполнена.</div>
</section>

<section class="page-section table-card">
    <div class="table-responsive">
        <table class="table table-clean" aria-label="Таблица новостей">
            <thead><tr><th>Заголовок</th><th>Статус</th><th>Категория</th><th>Дата</th><th>Действия</th></tr></thead>
            <tbody id="admin-news-body"></tbody>
        </table>
    </div>
</section>
{% endblock %}
