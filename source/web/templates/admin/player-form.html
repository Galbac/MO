<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{{ page_title }}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/static/css/app.css"><link rel="canonical" href="{{ canonical_url }}"></head>
<body data-page="{{ page_name }}"><div class="admin-shell"><aside class="admin-sidebar"><a href="/admin" class="brand-mark mb-4"><span class="brand-ball">TP</span><span>Admin</span></a><nav class="admin-nav"><a href="/admin/players" class="active">Players</a></nav></aside><main class="admin-main"><header class="admin-header"><div class="eyebrow">Player create/edit</div><h1 class="section-title">Player form with validation</h1></header><section class="content-card"><form data-prevent-double-submit data-api-path="/admin/players" data-api-method="POST"><div class="row g-3"><div class="col-md-6"><input class="form-control" name="first_name" placeholder="First name"></div><div class="col-md-6"><input class="form-control" name="last_name" placeholder="Last name"></div><div class="col-md-6"><input class="form-control" name="full_name" placeholder="Full name"></div><div class="col-md-6"><input class="form-control" name="slug" placeholder="Slug"></div><div class="col-md-4"><input class="form-control" name="country_code" placeholder="Country code"></div><div class="col-md-4"><select class="form-select" name="hand"><option value="right">right</option><option value="left">left</option></select></div><div class="col-md-4"><input class="form-control" name="current_rank" placeholder="Current rank"></div><div class="col-12"><textarea class="form-control" rows="5" name="biography" placeholder="Biography"></textarea></div><div class="col-12"><button class="btn btn-success rounded-pill" type="submit">Save player</button><div class="success-note d-none mt-3" data-form-feedback>Player saved.</div><div class="error-note d-none mt-3" data-form-error>Request failed.</div></div></div></form></section></main></div><script src="/static/js/app.js"></script></body></html>
