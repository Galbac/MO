<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{{ page_title }}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/static/css/app.css"><link rel="canonical" href="{{ canonical_url }}"></head>
<body data-page="{{ page_name }}"><div class="admin-shell"><aside class="admin-sidebar"><a href="/admin" class="brand-mark mb-4"><span class="brand-ball">MO</span><span>Админка</span></a><nav class="admin-nav"><a href="/admin/players" class="active">Игроки</a></nav></aside><main class="admin-main"><header class="admin-header"><div class="eyebrow">Создание и редактирование игрока</div><h1 class="section-title">Форма игрока с валидацией</h1></header><section class="content-card"><form data-prevent-double-submit data-api-path="/admin/players" data-api-method="POST"><div class="row g-3"><div class="col-md-6"><input class="form-control" name="first_name" placeholder="Имя"></div><div class="col-md-6"><input class="form-control" name="last_name" placeholder="Фамилия"></div><div class="col-md-6"><input class="form-control" name="full_name" placeholder="Полное имя"></div><div class="col-md-6"><input class="form-control" name="slug" placeholder="Слаг"></div><div class="col-md-4"><input class="form-control" name="country_code" placeholder="Код страны"></div><div class="col-md-4"><select class="form-select" name="hand"><option value="right">Правша</option><option value="left">Левша</option></select></div><div class="col-md-4"><input class="form-control" name="current_rank" placeholder="Текущий рейтинг"></div><div class="col-12"><textarea class="form-control" rows="5" name="biography" placeholder="Биография"></textarea></div><div class="col-12"><button class="btn btn-success rounded-pill" type="submit">Сохранить игрока</button><div class="success-note d-none mt-3" data-form-feedback>Игрок сохранен.</div><div class="error-note d-none mt-3" data-form-error>Запрос не выполнен.</div></div></div></form></section></main></div><script src="/static/js/app.js"></script></body></html>
