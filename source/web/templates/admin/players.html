{% extends "admin/base.html" %}
{% block content %}
<section class="admin-page-header content-card d-flex justify-content-between align-items-center gap-3 flex-wrap">
    <div>
        <div class="section-kicker">Players admin</div>
        <h1 class="section-title mt-2">Игроки и импорт базы</h1>
    </div>
    <a href="/admin/players/new" class="btn btn-lime">Новый игрок</a>
</section>

<section class="page-section content-card">
    <form id="admin-players-filters" class="admin-form-grid">
        <input class="form-control span-6" id="admin-players-search" placeholder="Поиск по игрокам">
        <input class="form-control span-3" id="admin-players-country" placeholder="Country code">
        <select class="form-select span-3" id="admin-players-hand"><option value="">Hand</option><option value="right">Right</option><option value="left">Left</option></select>
        <select class="form-select span-3" id="admin-players-status"><option value="">Status</option><option value="active">Active</option><option value="inactive">Inactive</option></select>
    </form>
</section>

<section class="page-section content-card">
    <div class="section-kicker">Bulk import</div>
    <h2 class="section-title mt-2 mb-3">Импорт игроков</h2>
    <form id="admin-player-import-form">
        <div class="d-grid gap-3">
            <textarea class="form-control" id="admin-player-import-json" rows="4" placeholder='[{"slug":"carlos-alcaraz","full_name":"Carlos Alcaraz","country_code":"ESP"}]'></textarea>
            <button class="btn btn-ghost-dark" type="submit">Импортировать</button>
            <div class="alert alert-success d-none mb-0" id="admin-player-import-feedback">Импорт выполнен.</div>
            <div class="alert alert-danger d-none mb-0" id="admin-player-import-error">Ошибка импорта.</div>
        </div>
    </form>
</section>

<section class="page-section table-card">
    <div class="table-responsive">
        <table class="table table-clean" aria-label="Таблица игроков">
            <thead><tr><th>Игрок</th><th>Страна</th><th>Рейтинг</th><th>Статус</th><th>Действия</th></tr></thead>
            <tbody id="admin-players-body"></tbody>
        </table>
    </div>
</section>
{% endblock %}
