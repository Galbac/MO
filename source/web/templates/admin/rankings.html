<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{{ page_title }}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/static/css/app.css"><link rel="canonical" href="{{ canonical_url }}"></head>
<body data-page="{{ page_name }}"><div class="admin-shell"><aside class="admin-sidebar"><a href="/admin" class="brand-mark mb-4"><span class="brand-ball">TP</span><span>Admin</span></a><nav class="admin-nav"><a href="/admin/rankings" class="active">Rankings</a><a href="/admin/integrations">Integrations</a></nav></aside><main class="admin-main"><header class="admin-header"><div class="eyebrow">Rankings import</div><h1 class="section-title">Import jobs, status history and recalculation controls.</h1></header><div class="admin-layout-grid two"><section class="content-card"><h2 class="section-title">Import file</h2><form data-prevent-double-submit data-api-path="/admin/rankings/import" data-api-method="POST"><div class="d-grid gap-3"><input class="form-control" name="source_file" placeholder="ranking_snapshot.csv"><button class="btn btn-success rounded-pill" type="submit">Start import</button><div class="success-note d-none" data-form-feedback>Import queued.</div><div class="error-note d-none" data-form-error>Request failed.</div></div></form></section><section class="content-card"><h2 class="section-title">Recalculate movement</h2><button class="btn btn-outline-dark rounded-pill" data-api-action data-api-method="POST" data-api-path="/admin/rankings/recalculate-movements" data-target-feedback="rankings-recalc-feedback">Run recalculation</button><div class="success-note d-none mt-3" id="rankings-recalc-feedback">Recalculation queued.</div></section></div><section class="content-card mt-4"><div class="section-title h5 mb-3">Import jobs</div><div class="table-responsive"><table class="table align-middle"><thead><tr><th>ID</th><th>Type</th><th>Status</th><th>Imported</th><th>Rows</th></tr></thead><tbody id="admin-ranking-jobs"></tbody></table></div></section></main></div><script src="/static/js/app.js"></script></body></html>
