{% extends "admin/base.html" %}
{% block content %}
<section class="admin-page-header hero-card">
    <div class="section-kicker">Настройки</div>
    <h1 class="hero-title mt-3">SEO, бренд, контакты поддержки и служебные заметки.</h1>
</section>

<div class="alert alert-danger d-none page-section" id="admin-settings-error"></div>

<section class="page-section admin-grid two">
    <section class="content-card">
        <div class="section-kicker">Сводка</div>
        <h2 class="section-title mt-2 mb-3">Текущие настройки</h2>
        <div id="admin-settings-summary"></div>
    </section>
    <section class="content-card">
        <div class="section-kicker">Заметки</div>
        <h2 class="section-title mt-2 mb-3">Операционные заметки</h2>
        <div id="admin-settings-notes-preview"></div>
    </section>
</section>

<section class="page-section content-card">
    <div class="section-kicker">Хранилище</div>
    <h2 class="section-title mt-2 mb-3">Файл runtime-настроек</h2>
    <div id="admin-settings-storage"></div>
</section>

<section class="page-section content-card">
    <form data-api-path="/admin/settings" data-api-method="PATCH">
        <div class="admin-form-grid">
            <input class="form-control span-6" name="seo_title" placeholder="SEO-заголовок">
            <input class="form-control span-6" name="support_email" placeholder="Почта поддержки">
            <textarea class="form-control span-12" rows="5" name="provider_notes" placeholder="Служебные заметки для команды"></textarea>
            <div class="span-12">
                <div class="section-kicker mb-2">UX / UI режим</div>
                <div class="d-flex flex-wrap gap-3">
                    <label class="entity-card p-3 flex-grow-1">
                        <input class="form-check-input me-2" type="radio" name="ui_mode" value="current">
                        <strong>Текущий спортивный режим</strong>
                        <div class="text-muted small mt-2">Чистый, спортивный, редакционный и премиальный интерфейс.</div>
                    </label>
                    <label class="entity-card p-3 flex-grow-1">
                        <input class="form-check-input me-2" type="radio" name="ui_mode" value="future_3000">
                        <strong>Режим 3000-х</strong>
                        <div class="text-muted small mt-2">Футуристичный, нереалистичный, светящийся и более смелый визуальный слой.</div>
                    </label>
                </div>
            </div>
            <label class="span-12 entity-card p-3 d-flex align-items-center justify-content-between gap-3">
                <span>
                    <strong class="d-block">Вечерняя тема</strong>
                    <span class="text-muted small d-block mt-1">Отдельная вечерняя тема с глубокими тонами, не просто инверсия.</span>
                </span>
                <input class="form-check-input" type="checkbox" name="evening_theme_enabled" value="true">
            </label>
        </div>
        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Сохранить настройки</button>
            <div class="alert alert-success d-none mb-0" data-form-feedback>Настройки сохранены.</div>
            <div class="alert alert-danger d-none mb-0" data-form-error>Не удалось сохранить настройки.</div>
        </div>
    </form>
</section>
{% endblock %}
