{% extends "admin/base.html" %}
{% block content %}
<section class="admin-page-header content-card">
    <div class="section-kicker">Taxonomy</div>
    <h1 class="section-title mt-2">Теги</h1>
</section>

<section class="page-section content-card">
    <form data-api-path="/admin/tags" data-api-method="POST">
        <div class="admin-form-grid">
            <input class="form-control span-6" name="name" placeholder="Название тега">
            <input class="form-control span-6" name="slug" placeholder="Slug">
        </div>
        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Создать тег</button>
            <div class="alert alert-success d-none mb-0" data-form-feedback>Тег создан.</div>
            <div class="alert alert-danger d-none mb-0" data-form-error>Не удалось создать тег.</div>
        </div>
    </form>
</section>

<section class="page-section content-card">
    <div class="admin-form-grid mb-4">
        <input class="form-control span-4" id="admin-tag-id" placeholder="Tag ID">
        <input class="form-control span-4" id="admin-tag-name" placeholder="New name">
        <input class="form-control span-4" id="admin-tag-slug" placeholder="New slug">
    </div>
    <div class="d-flex gap-2 mb-4">
        <button class="btn btn-ghost-dark" id="admin-tag-update" type="button">Обновить</button>
        <button class="btn btn-outline-danger" id="admin-tag-delete" type="button">Удалить</button>
    </div>
    <div class="notification-list" id="admin-tags-list"></div>
</section>
{% endblock %}
