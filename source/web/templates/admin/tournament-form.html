<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{{ page_title }}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/static/css/app.css"><link rel="canonical" href="{{ canonical_url }}"></head>
<body data-page="{{ page_name }}"><div class="admin-shell"><aside class="admin-sidebar"><a href="/admin" class="brand-mark mb-4"><span class="brand-ball">TP</span><span>Admin</span></a><nav class="admin-nav"><a href="/admin/tournaments" class="active">Tournaments</a></nav></aside><main class="admin-main"><header class="admin-header"><div class="eyebrow">Tournament create/edit</div><h1 class="section-title">Tournament form</h1></header><section class="content-card"><form data-prevent-double-submit data-api-path="/admin/tournaments" data-api-method="POST"><div class="row g-3"><div class="col-md-6"><input class="form-control" name="name" placeholder="Tournament name"></div><div class="col-md-6"><input class="form-control" name="slug" placeholder="Slug"></div><div class="col-md-4"><select class="form-select" name="category"><option value="grand_slam">grand_slam</option><option value="masters_1000">masters_1000</option></select></div><div class="col-md-4"><select class="form-select" name="surface"><option value="hard">hard</option><option value="clay">clay</option></select></div><div class="col-md-4"><input class="form-control" name="season_year" placeholder="Season year"></div><div class="col-md-6"><input class="form-control" name="city" placeholder="City"></div><div class="col-md-6"><input class="form-control" name="country_code" placeholder="Country code"></div><div class="col-12"><textarea class="form-control" rows="4" name="description" placeholder="Description"></textarea></div><div class="col-12"><button class="btn btn-success rounded-pill" type="submit">Save tournament</button><div class="success-note d-none mt-3" data-form-feedback>Tournament saved.</div><div class="error-note d-none mt-3" data-form-error>Request failed.</div></div></div></form></section></main></div><script src="/static/js/app.js"></script></body></html>
