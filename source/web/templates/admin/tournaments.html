{% extends "admin/base.html" %}
{% block content %}
<section class="admin-page-header content-card d-flex justify-content-between align-items-center gap-3 flex-wrap">
    <div>
        <div class="section-kicker">Tournaments admin</div>
        <h1 class="section-title mt-2">Турниры, публикация и draw-операции</h1>
    </div>
    <a href="/admin/tournaments/new" class="btn btn-lime">Создать турнир</a>
</section>

<section class="page-section content-card">
    <form id="admin-tournaments-filters" class="admin-form-grid">
        <input class="form-control span-6" id="admin-tournaments-search" placeholder="Search">
        <input class="form-control span-3" id="admin-tournaments-category" placeholder="Category">
        <select class="form-select span-3" id="admin-tournaments-surface"><option value="">Surface</option><option value="hard">Hard</option><option value="clay">Clay</option><option value="grass">Grass</option></select>
        <select class="form-select span-3" id="admin-tournaments-status"><option value="">Status</option><option value="scheduled">Scheduled</option><option value="published">Published</option><option value="live">Live</option></select>
        <input class="form-control span-3" id="admin-tournaments-season" placeholder="Season year">
    </form>
</section>

<section class="page-section table-card">
    <div class="table-responsive">
        <table class="table table-clean" aria-label="Таблица турниров">
            <thead><tr><th>Название</th><th>Категория</th><th>Покрытие</th><th>Статус</th><th>Действия</th></tr></thead>
            <tbody id="admin-tournaments-body"></tbody>
        </table>
    </div>
</section>
{% endblock %}
