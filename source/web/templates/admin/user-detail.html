<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{{ page_title }}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/static/css/app.css"><link rel="canonical" href="{{ canonical_url }}"></head>
<body data-page="{{ page_name }}" data-entity-id="{{ entity_id | default('') }}"><div class="admin-shell"><aside class="admin-sidebar"><a href="/admin" class="brand-mark mb-4"><span class="brand-ball">MO</span><span>Админка</span></a><nav class="admin-nav"><a href="/admin/users" class="active">Пользователи</a><a href="/admin/audit">Аудит</a></nav></aside><main class="admin-main"><header class="admin-header"><div class="eyebrow">Карточка пользователя</div><h1 class="section-title" id="admin-user-title">Загрузка пользователя...</h1></header><div class="admin-layout-grid two"><section class="content-card"><h2 class="section-title">Профиль</h2><form data-prevent-double-submit data-api-path="/admin/users/{{ entity_id }}" data-api-method="PATCH"><div class="d-grid gap-3"><input class="form-control" name="email" placeholder="Email"><input class="form-control" name="username" placeholder="Логин"><select class="form-select" name="role"><option value="admin">Администратор</option><option value="editor">Редактор</option><option value="operator">Оператор</option><option value="user">Пользователь</option></select><select class="form-select" name="status"><option value="active">Активен</option><option value="blocked">Заблокирован</option></select><button class="btn btn-success rounded-pill" type="submit">Сохранить изменения</button><div class="success-note d-none" data-form-feedback>Пользователь обновлен.</div><div class="error-note d-none" data-form-error>Запрос не выполнен.</div></div></form></section><section class="content-card"><h2 class="section-title">История действий</h2><div id="admin-user-history"></div></section></div></main></div><script src="/static/js/app.js"></script></body></html>
