<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{{ page_title }}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/static/css/app.css"><link rel="canonical" href="{{ canonical_url }}"></head>
<body data-page="{{ page_name }}" data-entity-id="{{ entity_id | default('') }}"><div class="admin-shell"><aside class="admin-sidebar"><a href="/admin" class="brand-mark mb-4"><span class="brand-ball">TP</span><span>Admin</span></a><nav class="admin-nav"><a href="/admin/users" class="active">Users</a><a href="/admin/audit">Audit</a></nav></aside><main class="admin-main"><header class="admin-header"><div class="eyebrow">User detail</div><h1 class="section-title" id="admin-user-title">Loading user...</h1></header><div class="admin-layout-grid two"><section class="content-card"><h2 class="section-title">Profile</h2><form data-prevent-double-submit data-api-path="/admin/users/{{ entity_id }}" data-api-method="PATCH"><div class="d-grid gap-3"><input class="form-control" name="email" placeholder="Email"><input class="form-control" name="username" placeholder="Username"><select class="form-select" name="role"><option value="admin">admin</option><option value="editor">editor</option><option value="operator">operator</option><option value="user">user</option></select><select class="form-select" name="status"><option value="active">active</option><option value="blocked">blocked</option></select><button class="btn btn-success rounded-pill" type="submit">Save changes</button><div class="success-note d-none" data-form-feedback>User updated.</div><div class="error-note d-none" data-form-error>Request failed.</div></div></form></section><section class="content-card"><h2 class="section-title">Action history</h2><div id="admin-user-history"></div></section></div></main></div><script src="/static/js/app.js"></script></body></html>
