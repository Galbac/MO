{% extends "admin/base.html" %}
{% block content %}
<section class="admin-page-header hero-card">
    <div class="section-kicker">User detail</div>
    <h1 class="hero-title mt-3" id="admin-user-title">Загрузка пользователя...</h1>
</section>

<section class="page-section admin-grid two">
    <section class="content-card">
        <div class="section-kicker">Profile</div>
        <h2 class="section-title mt-2 mb-3">Редактирование пользователя</h2>
        <form data-api-path="/admin/users/{{ entity_id }}" data-api-method="PATCH">
            <div class="d-grid gap-3">
                <input class="form-control" name="email" placeholder="Email">
                <input class="form-control" name="username" placeholder="Username">
                <select class="form-select" name="role"><option value="admin">Admin</option><option value="editor">Editor</option><option value="operator">Operator</option><option value="user">User</option></select>
                <select class="form-select" name="status"><option value="active">Active</option><option value="blocked">Blocked</option></select>
                <button class="btn btn-primary" type="submit">Сохранить</button>
                <div class="alert alert-success d-none mb-0" data-form-feedback>Пользователь обновлен.</div>
                <div class="alert alert-danger d-none mb-0" data-form-error>Не удалось обновить пользователя.</div>
            </div>
        </form>
        <div class="admin-form-grid mt-4">
            <select class="form-select span-6" id="admin-user-role-control"><option value="admin">Admin</option><option value="editor">Editor</option><option value="operator">Operator</option><option value="user">User</option></select>
            <select class="form-select span-6" id="admin-user-status-control"><option value="active">Active</option><option value="blocked">Blocked</option></select>
        </div>
        <div class="d-flex gap-2 mt-3">
            <button class="btn btn-ghost-dark" id="admin-user-set-role" type="button">Обновить роль</button>
            <button class="btn btn-ghost-dark" id="admin-user-set-status" type="button">Обновить статус</button>
            <button class="btn btn-outline-danger" id="admin-user-delete" type="button">Удалить</button>
        </div>
    </section>
    <section class="content-card">
        <div class="section-kicker">Audit</div>
        <h2 class="section-title mt-2 mb-3">История действий</h2>
        <div class="timeline-list" id="admin-user-history"></div>
    </section>
</section>
{% endblock %}
