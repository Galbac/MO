<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
</head>
<body data-page="{{ page_name }}">
<a class="visually-hidden-focusable skip-link" href="#admin-main-content">Перейти к содержимому админки</a>
<div class="admin-shell">
    <aside class="admin-sidebar" aria-label="Боковая панель админки"><a href="/admin" class="brand-mark mb-4"><span class="brand-ball">MO</span><span>Админка</span></a><nav class="admin-nav" aria-label="Навигация админки"><a href="/admin">Панель</a><a class="active" href="/admin/users">Пользователи</a><a href="/admin/players">Игроки</a><a href="/admin/news">Новости</a></nav></aside>
    <main id="admin-main-content" class="admin-main" role="main" tabindex="-1">
        <header class="admin-header"><div class="eyebrow">Пользователи</div><h1 class="section-title">Список пользователей с фильтрами, ролями и статусами.</h1></header>
        <section class="entity-card mb-4" aria-label="Фильтры пользователей">
            <form id="admin-users-filters" class="row g-3 align-items-end">
                <div class="col-md-4"><label class="form-label" for="admin-users-search">Search</label><input class="form-control" id="admin-users-search" name="search" placeholder="email, username"></div>
                <div class="col-md-3"><label class="form-label" for="admin-users-role">Role</label><select class="form-select" id="admin-users-role" name="role"><option value="">Все</option><option value="admin">Admin</option><option value="editor">Editor</option><option value="operator">Operator</option><option value="user">User</option></select></div>
                <div class="col-md-3"><label class="form-label" for="admin-users-status">Status</label><select class="form-select" id="admin-users-status" name="status"><option value="">Все</option><option value="active">active</option><option value="blocked">blocked</option><option value="deleted">deleted</option></select></div>
                <div class="col-md-2 d-flex gap-2"><button class="btn btn-success w-100" type="submit">Применить</button><button class="btn btn-outline-secondary" id="admin-users-reset" type="button">Сброс</button></div>
            </form>
        </section>
        <section class="table-shell"><table class="table table-clean" aria-label="Таблица пользователей"><thead><tr><th>ID</th><th>Email</th><th>Логин</th><th>Роль</th><th>Статус</th><th>Действия</th></tr></thead><tbody id="admin-users-body"></tbody></table></section>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
