{% extends "admin/base.html" %}
{% block content %}
<section class="admin-page-header content-card">
    <div class="section-kicker">Users management</div>
    <h1 class="section-title mt-2">Список пользователей, роли и статусы доступа</h1>
</section>

<section class="page-section content-card">
    <form id="admin-users-filters" class="admin-form-grid">
        <input class="form-control span-6" id="admin-users-search" placeholder="Поиск по email или username">
        <select class="form-select span-3" id="admin-users-role"><option value="">Все роли</option><option value="admin">Admin</option><option value="editor">Editor</option><option value="operator">Operator</option></select>
        <select class="form-select span-3" id="admin-users-status"><option value="">Все статусы</option><option value="active">Active</option><option value="blocked">Blocked</option></select>
    </form>
</section>

<section class="page-section table-card">
    <div class="table-responsive">
        <table class="table table-clean" aria-label="Таблица пользователей">
            <thead><tr><th>ID</th><th>Email</th><th>Логин</th><th>Роль</th><th>Статус</th><th>Действия</th></tr></thead>
            <tbody id="admin-users-body"></tbody>
        </table>
    </div>
</section>
{% endblock %}
