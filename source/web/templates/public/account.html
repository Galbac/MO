<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
</head>
<body data-page="{{ page_name }}">
<div class="site-shell">
    <header class="topbar"><div class="container py-3 d-flex justify-content-between align-items-center gap-3"><a href="/" class="brand-mark"><span class="brand-ball">MO</span><span>Makhachkala Open</span></a><nav class="nav-pills-custom"><a href="/account" class="active">Профиль</a><a href="/notifications">Уведомления</a></nav></div></header>
    <main class="container py-4">
        <section class="hero-panel mb-4"><div class="eyebrow">Личный кабинет</div><h1 class="display-title" id="account-name">Личный кабинет</h1><p class="lead-copy">Профиль, избранное, подписки и настройки пароля.</p></section>
        <div class="row g-4">
            <div class="col-lg-4"><section class="content-card"><h2 class="section-title">Профиль</h2><form data-prevent-double-submit data-api-path="/users/me" data-api-method="PATCH"><div class="d-grid gap-3"><input class="form-control" id="account-first-name" name="first_name" placeholder="Имя"><input class="form-control" id="account-last-name" name="last_name" placeholder="Фамилия"><input class="form-control" id="account-timezone" name="timezone" placeholder="Часовой пояс"><button class="btn btn-success rounded-pill" type="submit">Сохранить профиль</button><div class="success-note d-none" data-form-feedback>Профиль сохранен.</div><div class="error-note d-none" data-form-error>Запрос не выполнен.</div></div></form></section></div>
            <div class="col-lg-4"><section class="content-card"><h2 class="section-title">Избранное</h2><div class="d-grid gap-3" id="account-favorites"></div></section></div>
            <div class="col-lg-4"><section class="content-card"><h2 class="section-title">Подписки</h2><div class="d-grid gap-3" id="account-subscriptions"></div></section></div>
        </div>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
