<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
</head>
<body data-page="{{ page_name }}">
<div class="site-shell">
    <header class="topbar"><div class="container py-3 d-flex justify-content-between align-items-center gap-3"><a href="/" class="brand-mark"><span class="brand-ball">TP</span><span>Tennis Portal</span></a><nav class="nav-pills-custom"><a href="/account" class="active">Account</a><a href="/notifications">Notifications</a></nav></div></header>
    <main class="container py-4">
        <section class="hero-panel mb-4"><div class="eyebrow">Personal area</div><h1 class="display-title" id="account-name">Profile, favorites, subscriptions and password settings.</h1></section>
        <div class="row g-4">
            <div class="col-lg-4"><section class="content-card"><h2 class="section-title">Profile</h2><form data-prevent-double-submit data-api-path="/users/me" data-api-method="PATCH"><div class="d-grid gap-3"><input class="form-control" id="account-first-name" name="first_name" placeholder="First name"><input class="form-control" id="account-last-name" name="last_name" placeholder="Last name"><input class="form-control" id="account-timezone" name="timezone" placeholder="Timezone"><button class="btn btn-success rounded-pill" type="submit">Save profile</button><div class="success-note d-none" data-form-feedback>Profile saved.</div><div class="error-note d-none" data-form-error>Request failed.</div></div></form></section></div>
            <div class="col-lg-4"><section class="content-card"><h2 class="section-title">Favorites</h2><div class="d-grid gap-3" id="account-favorites"></div></section></div>
            <div class="col-lg-4"><section class="content-card"><h2 class="section-title">Subscriptions</h2><div class="d-grid gap-3" id="account-subscriptions"></div></section></div>
        </div>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
