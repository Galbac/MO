{% extends "public/base.html" %}
{% block content %}
<section class="page-section hero-card">
    <div class="section-kicker">Head to head</div>
    <h1 class="hero-title mt-3">H2H-сравнение игроков с разбором по покрытиям, форме и истории очных встреч.</h1>
</section>

<section class="page-section toolbar">
    <div class="toolbar__group w-100">
        <select class="form-select" id="h2h-player1" aria-label="Выбор первого игрока"></select>
        <select class="form-select" id="h2h-player2" aria-label="Игрок 2"></select>
        <button class="btn btn-lime" id="h2h-compare" type="button">Сравнить</button>
    </div>
</section>

<section class="page-section">
    <div class="cards-grid cards-3" id="h2h-summary"></div>
</section>

<section class="page-section page-grid two">
    <section class="table-card">
        <div class="section-kicker">Surface split</div>
        <h2 class="section-title mt-2 mb-3">По покрытиям</h2>
        <div class="table-responsive">
            <table class="table table-clean" aria-label="Статистика личных встреч по покрытиям">
                <thead><tr><th>Покрытие</th><th>Игрок 1</th><th>Игрок 2</th></tr></thead>
                <tbody id="h2h-surface-split"></tbody>
            </table>
        </div>
    </section>
    <section class="content-card">
        <div class="section-kicker">History</div>
        <h2 class="section-title mt-2 mb-3">История матчей</h2>
        <div class="cards-grid" id="h2h-history"></div>
    </section>
</section>
{% endblock %}
