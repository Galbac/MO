{% extends "public/base.html" %}
{% block content %}
<section class="page-section" id="match-scoreboard">
    <div class="scoreboard-card"><div class="skeleton card"></div></div>
</section>

<section class="page-section page-grid two">
    <div class="d-grid gap-4">
        <section class="content-card">
            <div class="section-kicker">Stats</div>
            <h2 class="section-title mt-2 mb-3">Ключевая статистика</h2>
            <div id="match-stats" aria-label="Статистика матча"></div>
        </section>
        <section class="timeline-card">
            <div class="section-kicker">Live timeline</div>
            <h2 class="section-title mt-2 mb-3">Лента событий</h2>
            <div class="timeline-list" id="match-timeline"></div>
        </section>
        <section class="timeline-card">
            <div class="section-kicker">Point by point</div>
            <h2 class="section-title mt-2 mb-3">Розыгрыши</h2>
            <div class="timeline-list" id="match-points"></div>
        </section>
    </div>
    <div class="d-grid gap-4">
        <section class="content-card">
            <div class="section-kicker">Preview</div>
            <h2 class="section-title mt-2 mb-3">Превью матча</h2>
            <div id="match-preview"></div>
        </section>
        <section class="content-card">
            <div class="section-kicker">Score API</div>
            <h2 class="section-title mt-2 mb-3">Raw score service</h2>
            <div id="match-score-service"></div>
        </section>
        <section class="content-card">
            <div class="section-kicker">H2H</div>
            <h2 class="section-title mt-2 mb-3">Личные встречи</h2>
            <div id="match-h2h"></div>
        </section>
        <section class="content-card">
            <div class="section-kicker">Recent form</div>
            <h2 class="section-title mt-2 mb-3">Последние матчи игроков</h2>
            <div class="cards-grid" id="match-form"></div>
        </section>
        <section class="content-card">
            <div class="section-kicker">Related news</div>
            <h2 class="section-title mt-2 mb-3">Связанные новости</h2>
            <div class="cards-grid" id="match-news"></div>
        </section>
    </div>
</section>
{% endblock %}
