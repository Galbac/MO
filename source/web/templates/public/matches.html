<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ meta_description | default(page_title) }}">
    <meta name="robots" content="{{ robots | default('index,follow') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
    <meta property="og:title" content="{{ og_title | default(page_title) }}">
    <meta property="og:description" content="{{ og_description | default(meta_description | default(page_title)) }}">
    <meta property="og:type" content="{{ og_type | default('website') }}">
    <meta property="og:url" content="{{ canonical_url | default('') }}">
    {% if og_image %}<meta property="og:image" content="{{ og_image }}">{% endif %}
{% if schema_json %}<script type="application/ld+json">{{ schema_json | safe }}</script>{% endif %}
</head>
<body data-page="{{ page_name }}">
<a class="visually-hidden-focusable skip-link" href="#main-content">Перейти к основному контенту</a>
<div class="site-shell">
    <header class="topbar" role="banner"><div class="container py-3 d-flex justify-content-between align-items-center gap-3"><a href="/" class="brand-mark"><span class="brand-ball">MO</span><span>Makhachkala Open</span></a><nav class="nav-pills-custom" aria-label="Основная навигация"><a href="/">Главная</a><a href="/players">Игроки</a><a class="active" href="/matches">Матчи</a><a href="/live">Лайв</a></nav></div></header>
    <main id="main-content" class="container py-4" role="main" tabindex="-1">
        <section class="hero-panel mb-4"><div class="eyebrow">Каталог матчей</div><h1 class="display-title">Ежедневное расписание, фильтры по статусу и лайв-метки в одном списке.</h1></section>
        <section class="filter-bar mb-4"><div class="row g-3"><div class="col-md-3"><input class="form-control" type="date" aria-label="Фильтр по дате"></div><div class="col-md-3"><select class="form-select" id="matches-status" aria-label="Фильтр по статусу матча"><option value="">Все статусы</option><option value="live">Лайв</option><option value="finished">Завершен</option></select></div><div class="col-md-3"><select class="form-select" aria-label="Фильтр по турниру"><option>Все турниры</option></select></div><div class="col-md-3"><button class="btn btn-outline-dark rounded-pill w-100" id="matches-filter">Применить</button></div></div></section>
        <section class="alert alert-danger d-none" id="matches-error"></section><section class="empty-state mt-4 d-none" id="matches-empty">Матчи по выбранным фильтрам не найдены.</section><div class="d-grid gap-3" id="matches-list"><div class="entity-card"><div class="skeleton card"></div></div></div>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
