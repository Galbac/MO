<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
</head>
<body data-page="{{ page_name }}">
<div class="site-shell">
    <header class="topbar"><div class="container py-3 d-flex justify-content-between align-items-center gap-3"><a href="/" class="brand-mark"><span class="brand-ball">MO</span><span>Makhachkala Open</span></a><nav class="nav-pills-custom"><a href="/">Главная</a><a href="/players">Игроки</a><a class="active" href="/matches">Матчи</a><a href="/live">Лайв</a></nav></div></header>
    <main class="container py-4">
        <section class="hero-panel mb-4"><div class="eyebrow">Каталог матчей</div><h1 class="display-title">Ежедневное расписание, фильтры по статусу и лайв-метки в одном списке.</h1></section>
        <section class="filter-bar mb-4"><div class="row g-3"><div class="col-md-3"><input class="form-control" type="date" ></div><div class="col-md-3"><select class="form-select" id="matches-status"><option value="">Все статусы</option><option value="live">Лайв</option><option value="finished">Завершен</option></select></div><div class="col-md-3"><select class="form-select"><option>Все турниры</option></select></div><div class="col-md-3"><button class="btn btn-outline-dark rounded-pill w-100" id="matches-filter">Применить</button></div></div></section>
        <div class="d-grid gap-3" id="matches-list"><div class="entity-card"><div class="skeleton card"></div></div></div>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
