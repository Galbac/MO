<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
</head>
<body data-page="{{ page_name }}" data-entity-slug="{{ entity_slug | default("") }}">
<div class="site-shell">
    <header class="topbar"><div class="container py-3 d-flex justify-content-between align-items-center gap-3"><a href="/" class="brand-mark"><span class="brand-ball">TP</span><span>Tennis Portal</span></a><nav class="nav-pills-custom"><a href="/news" class="active">News</a><a href="/matches">Matches</a></nav></div></header>
    <main class="container py-4">
        <section class="news-cover mb-4 p-4 d-flex align-items-end"><div class="text-white"><div class="eyebrow text-white" id="article-category">Featured story</div><h1 class="display-title mb-0" id="article-title">Loading article...</h1></div></section>
        <div class="row g-4"><div class="col-lg-8"><section class="content-card"><p class="text-muted" id="article-meta"></p><p class="lead-copy" id="article-lead"></p><div class="mt-4" id="article-content"></div></section></div><div class="col-lg-4"><section class="content-card"><h2 class="section-title">Related news</h2><div class="d-grid gap-3" id="article-related"></div></section></div></div>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
