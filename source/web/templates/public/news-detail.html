<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ meta_description | default(page_title) }}">
    <meta name="robots" content="{{ robots | default('index,follow') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
    <meta property="og:title" content="{{ og_title | default(page_title) }}">
    <meta property="og:description" content="{{ og_description | default(meta_description | default(page_title)) }}">
    <meta property="og:type" content="{{ og_type | default('website') }}">
    <meta property="og:url" content="{{ canonical_url | default('') }}">
    {% if og_image %}<meta property="og:image" content="{{ og_image }}">{% endif %}
{% if schema_json %}<script type="application/ld+json">{{ schema_json | safe }}</script>{% endif %}
</head>
<body data-page="{{ page_name }}" data-entity-slug="{{ entity_slug | default("") }}">
<a class="visually-hidden-focusable skip-link" href="#main-content">Перейти к основному контенту</a>
<div class="site-shell">
    <header class="topbar" role="banner"><div class="container py-3 d-flex justify-content-between align-items-center gap-3"><a href="/" class="brand-mark"><span class="brand-ball">MO</span><span>Makhachkala Open</span></a><nav class="nav-pills-custom" aria-label="Основная навигация"><a href="/news" class="active">Новости</a><a href="/matches">Матчи</a></nav></div></header>
    <main class="container py-4" id="main-content" role="main" tabindex="-1">
        <section class="news-cover mb-4 p-4 d-flex align-items-end"><div class="text-white"><div class="eyebrow text-white" id="article-category">Главная история</div><h1 class="display-title mb-0" id="article-title">Загрузка статьи...</h1></div></section>
        <div class="row g-4"><div class="col-lg-8"><section class="content-card"><p class="text-muted" id="article-meta"></p><p class="lead-copy" id="article-lead"></p><div class="mt-4" id="article-content"></div></section></div><div class="col-lg-4"><section class="content-card"><h2 class="section-title">Похожие новости</h2><div class="d-grid gap-3" id="article-related"></div></section></div></div>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
