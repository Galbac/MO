{% extends "public/base.html" %}
{% block content %}
<section class="page-section hero-card">
    <div class="section-kicker">Материал</div>
    <h1 class="hero-title mt-3" id="news-title">Загрузка материала...</h1>
    <p class="section-lead mt-3" id="news-lead">Получаем лид, категорию и связанный контент.</p>
    <div class="d-flex flex-wrap gap-2 mt-3" id="news-meta"></div>
</section>

<section class="page-section page-grid two">
    <article class="content-card">
        <div class="article-cover mb-4"></div>
        <div id="news-content" class="search-grid"></div>
    </article>
    <aside class="content-card">
        <div class="section-kicker">Связанные материалы</div>
        <h2 class="section-title mt-2 mb-3">Читайте также</h2>
        <div class="cards-grid" id="news-related"></div>
    </aside>
</section>
{% endblock %}
