<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ meta_description | default(page_title) }}">
    <meta name="robots" content="{{ robots | default('index,follow') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
    <meta property="og:title" content="{{ og_title | default(page_title) }}">
    <meta property="og:description" content="{{ og_description | default(meta_description | default(page_title)) }}">
    <meta property="og:type" content="{{ og_type | default('website') }}">
    <meta property="og:url" content="{{ canonical_url | default('') }}">
    {% if og_image %}<meta property="og:image" content="{{ og_image }}">{% endif %}
{% if schema_json %}<script type="application/ld+json">{{ schema_json | safe }}</script>{% endif %}
</head>
<body data-page="{{ page_name }}">
<a class="visually-hidden-focusable skip-link" href="#main-content">Перейти к основному контенту</a>
<div class="site-shell">
    <header class="topbar" role="banner"><div class="container py-3 d-flex justify-content-between align-items-center gap-3"><a href="/" class="brand-mark"><span class="brand-ball">MO</span><span>Makhachkala Open</span></a><nav class="nav-pills-custom" aria-label="Основная навигация"><a href="/">Главная</a><a href="/news" class="active">Новости</a><a href="/search">Поиск</a></nav></div></header>
    <main class="container py-4" id="main-content" role="main" tabindex="-1">
        <section class="hero-panel mb-4"><div class="eyebrow">Редакция</div><h1 class="display-title">Фильтры по категориям, выделенный материал и поисковая редакционная лента.</h1></section>
        <div class="row g-4"><div class="col-lg-8"><section class="content-card"><h2 class="section-title">Последние материалы</h2><div class="alert alert-danger d-none" id="news-list-error"></div><div class="empty-state mt-4 d-none" id="news-list-empty">По выбранным параметрам новости не найдены.</div><div class="d-grid gap-3" id="news-list-grid"></div></section></div><div class="col-lg-4"><section class="content-card"><h2 class="section-title">Фильтры</h2><div class="d-grid gap-3"><select class="form-select" id="news-category" aria-label="Фильтр по категории новостей"><option value="">Все категории</option></select><input class="form-control" id="news-search" placeholder="Поиск новостей" aria-label="Поиск новостей"></div></section></div></div>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
