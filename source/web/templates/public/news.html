{% extends "public/base.html" %}
{% block content %}
<section class="page-section hero-card">
    <div class="section-kicker">Редакция</div>
    <h1 class="hero-title mt-3">Новости, репортажи и аналитика в живом спортивном визуале.</h1>
    <p class="section-lead mt-3 mb-0">Лента новостей готова под главные блоки, категории, теги и переход в детальные страницы.</p>
</section>

<section class="page-section toolbar">
    <div class="toolbar__group w-100">
        <select class="form-select" id="news-category-filter" aria-label="Фильтр по категории новостей">
            <option>Все категории</option>
        </select>
        <select class="form-select" id="news-tag-filter" aria-label="Фильтр по тегам новостей">
            <option>Все теги</option>
        </select>
        <input class="form-control" id="news-search-input" placeholder="Поиск новостей" aria-label="Поиск новостей">
    </div>
</section>

<section class="page-section">
    <div class="alert alert-danger d-none" id="news-error"></div>
    <div class="alert alert-danger d-none" id="news-list-error"></div>
    <div class="state-card d-none" id="news-empty">Новостей пока нет.</div>
    <div class="state-card d-none" id="news-list-empty">Новостей пока нет.</div>
    <div class="cards-grid cards-3" id="news-grid">
        <div class="entity-card"><div class="skeleton card"></div></div>
    </div>
</section>
{% endblock %}
