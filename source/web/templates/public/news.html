<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
</head>
<body data-page="{{ page_name }}">
<div class="site-shell">
    <header class="topbar"><div class="container py-3 d-flex justify-content-between align-items-center gap-3"><a href="/" class="brand-mark"><span class="brand-ball">TP</span><span>Tennis Portal</span></a><nav class="nav-pills-custom"><a href="/">Home</a><a href="/news" class="active">News</a><a href="/search">Search</a></nav></div></header>
    <main class="container py-4">
        <section class="hero-panel mb-4"><div class="eyebrow">Newsroom</div><h1 class="display-title">Category filters, featured slot and searchable editorial feed.</h1></section>
        <div class="row g-4"><div class="col-lg-8"><section class="content-card"><h2 class="section-title">Latest stories</h2><div class="d-grid gap-3" id="news-list-grid"></div></section></div><div class="col-lg-4"><section class="content-card"><h2 class="section-title">Filters</h2><div class="d-grid gap-3"><select class="form-select" id="news-category"><option value="">All categories</option></select><input class="form-control" id="news-search" placeholder="Search news"></div></section></div></div>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
