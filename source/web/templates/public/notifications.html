<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ meta_description | default(page_title) }}">
    <meta name="robots" content="{{ robots | default('index,follow') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
    <meta property="og:title" content="{{ og_title | default(page_title) }}">
    <meta property="og:description" content="{{ og_description | default(meta_description | default(page_title)) }}">
    <meta property="og:type" content="{{ og_type | default('website') }}">
    <meta property="og:url" content="{{ canonical_url | default('') }}">
    {% if og_image %}<meta property="og:image" content="{{ og_image }}">{% endif %}
{% if schema_json %}<script type="application/ld+json">{{ schema_json | safe }}</script>{% endif %}
</head>
<body data-page="{{ page_name }}">
<div class="site-shell">
    <header class="topbar"><div class="container py-3 d-flex justify-content-between align-items-center gap-3"><a href="/" class="brand-mark"><span class="brand-ball">MO</span><span>Makhachkala Open</span></a><nav class="nav-pills-custom"><a href="/account">Профиль</a><a class="active" href="/notifications">Уведомления</a></nav></div></header>
    <main class="container py-4">
        <section class="hero-panel mb-4"><div class="eyebrow">Входящие</div><h1 class="display-title">Непрочитанные уведомления, последние события и быстрые действия.</h1><p class="lead-copy" id="notifications-count">Загрузка уведомлений...</p></section>
        <section class="content-card"><div class="d-flex justify-content-between align-items-center mb-3"><h2 class="section-title">Последние уведомления</h2><button class="btn btn-outline-dark rounded-pill" data-api-action data-api-method="PATCH" data-api-path="/notifications/read-all" data-target-feedback="notifications-feedback">Отметить все как прочитанные</button></div><div class="success-note d-none mb-3" id="notifications-feedback">Уведомления обновлены.</div><div id="notifications-list"></div></section>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
