{% extends "public/base.html" %}
{% block content %}
<section class="page-section hero-card">
    <div class="section-kicker">Inbox</div>
    <h1 class="hero-title mt-3">Уведомления и сигналы по избранным игрокам, матчам и турнирам.</h1>
    <p class="section-lead mt-3 mb-0" id="notifications-count">Загрузка уведомлений...</p>
</section>

<section class="page-section content-card">
    <div class="d-flex justify-content-between align-items-center gap-3 mb-3">
        <div>
            <div class="section-kicker">Latest</div>
            <h2 class="section-title mt-2">Последние уведомления</h2>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-ghost-dark" data-api-action data-api-method="PATCH" data-api-path="/notifications/read-all" data-target-feedback="notifications-feedback">Прочитать все</button>
            <button class="btn btn-ghost-dark" id="notifications-read-all-button" type="button">Sync read-all</button>
        </div>
    </div>
    <div class="alert alert-success d-none" id="notifications-feedback">Уведомления обновлены.</div>
    <div class="alert alert-danger d-none" id="notifications-error"></div>
    <div class="state-card d-none" id="notifications-empty">Пока нет уведомлений.</div>
    <div class="notification-list" id="notifications-list"></div>
</section>
{% endblock %}
