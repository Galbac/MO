<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
</head>
<body data-page="{{ page_name }}" data-entity-slug="{{ entity_slug | default("") }}">
<div class="site-shell">
    <header class="topbar">
        <div class="container py-3 d-flex justify-content-between align-items-center gap-3">
            <a href="/" class="brand-mark"><span class="brand-ball">MO</span><span>Makhachkala Open</span></a>
            <nav class="nav-pills-custom"><a href="/players" class="active">Игроки</a><a href="/matches">Матчи</a><a href="/news">Новости</a></nav>
        </div>
    </header>
    <main class="container py-4">
        <section class="hero-panel mb-4">
            <div class="row g-4 align-items-center">
                <div class="col-md-8">
                    <div class="eyebrow">Карточка игрока</div>
                    <h1 class="display-title" id="player-name">Загрузка игрока...</h1>
                    <p class="lead-copy" id="player-summary">Загрузка описания...</p>
                    <div class="d-flex flex-wrap gap-2 mt-3" id="player-badges"></div>
                </div>
                <div class="col-md-4">
                    <div class="content-card" id="player-upcoming-card"></div>
                </div>
            </div>
        </section>
        <div class="row g-4">
            <div class="col-lg-8">
                <section class="content-card mb-4"><h2 class="section-title">Статистика сезона</h2><div class="card-grid cols-3" id="player-stats-grid"></div></section>
                <section class="content-card mb-4"><h2 class="section-title">Последние матчи</h2><div class="d-grid gap-3" id="player-recent-matches"></div></section>
                <section class="content-card"><h2 class="section-title">История рейтинга</h2><table class="table table-clean"><thead><tr><th>Дата</th><th>Место</th><th>Очки</th><th>Движ.</th></tr></thead><tbody id="player-ranking-history"></tbody></table></section>
            </div>
            <div class="col-lg-4">
                <section class="content-card mb-4"><h2 class="section-title">Биография</h2><p class="text-muted mb-0" id="player-bio"></p></section>
                <section class="content-card mb-4"><h2 class="section-title">Титулы</h2><div class="d-grid gap-3" id="player-titles"></div></section>
                <section class="content-card"><h2 class="section-title">Новости игрока</h2><div class="d-grid gap-3" id="player-news"></div></section>
            </div>
        </div>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
