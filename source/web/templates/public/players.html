<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
</head>
<body data-page="{{ page_name }}">
<div class="site-shell">
    <header class="topbar">
        <div class="container py-3 d-flex flex-wrap justify-content-between align-items-center gap-3">
            <a href="/" class="brand-mark"><span class="brand-ball">TP</span><span>Tennis Portal</span></a>
            <nav class="nav-pills-custom"><a href="/">Home</a><a class="active" href="/players">Players</a><a href="/tournaments">Tournaments</a><a href="/matches">Matches</a><a href="/news">News</a></nav>
        </div>
    </header>
    <main class="container py-4">
        <section class="hero-panel mb-4">
            <div class="eyebrow">Players directory</div>
            <h1 class="display-title">Searchable player index with filters, sorting and pagination.</h1>
        </section>
        <section class="filter-bar mb-4 position-relative">
            <div class="row g-3">
                <div class="col-md-4"><input class="form-control" placeholder="Search players" id="players-search" data-search-demo></div>
                <div class="col-md-2"><select class="form-select" id="players-country"><option value="">Country</option><option value="SRB">SRB</option><option value="ITA">ITA</option></select></div>
                <div class="col-md-2"><select class="form-select" id="players-hand"><option value="">Hand</option><option value="right">right</option><option value="left">left</option></select></div>
                <div class="col-md-2"><select class="form-select" id="players-sort"><option value="rank_asc">Sort: rank</option><option value="name_asc">Name</option></select></div>
                <div class="col-md-2"><button class="btn btn-outline-dark w-100 rounded-pill" id="players-reset">Reset</button></div>
            </div>
            <div class="list-group position-absolute start-0 end-0 mt-2 d-none" data-search-suggestions></div>
        </section>
        <section class="card-grid cols-3" id="players-grid">
            <div class="entity-card"><div class="skeleton card"></div></div>
        </section>
        <div class="empty-state mt-4 d-none" id="players-empty">
            <strong>No players found.</strong>
            <div class="text-muted mt-2">Try another search or reset filters.</div>
        </div>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
