<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ meta_description | default(page_title) }}">
    <meta name="robots" content="{{ robots | default('index,follow') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
    <meta property="og:title" content="{{ og_title | default(page_title) }}">
    <meta property="og:description" content="{{ og_description | default(meta_description | default(page_title)) }}">
    <meta property="og:type" content="{{ og_type | default('website') }}">
    <meta property="og:url" content="{{ canonical_url | default('') }}">
    {% if og_image %}<meta property="og:image" content="{{ og_image }}">{% endif %}
{% if schema_json %}<script type="application/ld+json">{{ schema_json | safe }}</script>{% endif %}
</head>
<body data-page="{{ page_name }}">
<div class="site-shell">
    <header class="topbar"><div class="container py-3 d-flex justify-content-between align-items-center gap-3"><a href="/" class="brand-mark"><span class="brand-ball">MO</span><span>Makhachkala Open</span></a><nav class="nav-pills-custom" data-tab-group="rankings"><button class="active" data-tab-target="tab-atp" aria-controls="tab-atp">ATP</button><button data-tab-target="tab-wta" aria-controls="tab-wta">WTA</button></nav></div></header>
    <main class="container py-4">
        <section class="hero-panel mb-4"><div class="eyebrow">Срез рейтингов</div><h1 class="display-title">Таблицы ATP и WTA с движением позиций и датой среза.</h1></section>
        <section class="table-shell" id="tab-atp" data-tab-panel="rankings"><div class="d-flex justify-content-between mb-3"><h2 class="section-title">Рейтинг ATP</h2><span class="badge-soft" id="rankings-date">-</span></div><div class="alert alert-danger d-none" id="rankings-error"></div><div class="empty-state d-none" id="rankings-empty">Данные рейтинга пока недоступны.</div><table class="table table-clean"><thead><tr><th>Поз.</th><th>Движ.</th><th>Игрок</th><th>Страна</th><th>Очки</th></tr></thead><tbody id="rankings-atp-body"></tbody></table></section>
        <section class="table-shell d-none" id="tab-wta" data-tab-panel="rankings"><div class="d-flex justify-content-between mb-3"><h2 class="section-title">Рейтинг WTA</h2><span class="badge-soft">Женский тур</span></div><table class="table table-clean"><thead><tr><th>Поз.</th><th>Движ.</th><th>Игрок</th><th>Страна</th><th>Очки</th></tr></thead><tbody id="rankings-wta-body"></tbody></table></section>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
