<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
</head>
<body data-page="{{ page_name }}">
<div class="site-shell">
    <header class="topbar"><div class="container py-3 d-flex justify-content-between align-items-center gap-3"><a href="/" class="brand-mark"><span class="brand-ball">TP</span><span>Tennis Portal</span></a><nav class="nav-pills-custom" data-tab-group="search"><button class="active" data-tab-target="search-all">All</button><button data-tab-target="search-players">Players</button><button data-tab-target="search-news">News</button></nav></div></header>
    <main class="container py-4">
        <section class="hero-panel mb-4"><div class="eyebrow">Global search</div><h1 class="display-title">Fast search across players, tournaments, matches and news.</h1><div class="position-relative mt-4"><input class="form-control form-control-lg" id="search-query" data-search-demo placeholder="Search players, tournaments, matches, news"><div class="list-group position-absolute start-0 end-0 mt-2 d-none" data-search-suggestions></div></div></section>
        <section class="content-card" id="search-all" data-tab-panel="search"><h2 class="section-title">All results</h2><div class="d-grid gap-3" id="search-all-results"></div></section>
        <section class="content-card d-none" id="search-players" data-tab-panel="search"><h2 class="section-title">Player results</h2><div class="d-grid gap-3" id="search-player-results"></div></section>
        <section class="content-card d-none" id="search-news" data-tab-panel="search"><h2 class="section-title">News results</h2><div class="d-grid gap-3" id="search-news-results"></div></section>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
