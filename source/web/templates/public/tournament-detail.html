<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="canonical" href="{{ canonical_url }}">
</head>
<body data-page="{{ page_name }}" data-entity-slug="{{ entity_slug | default("") }}">
<div class="site-shell">
    <header class="topbar"><div class="container py-3 d-flex justify-content-between align-items-center gap-3"><a href="/" class="brand-mark"><span class="brand-ball">TP</span><span>Tennis Portal</span></a><nav class="nav-pills-custom"><a href="/tournaments" class="active">Tournaments</a><a href="/matches">Matches</a><a href="/news">News</a></nav></div></header>
    <main class="container py-4">
        <section class="hero-panel mb-4"><div class="eyebrow">Tournament card</div><h1 class="display-title" id="tournament-name">Loading tournament...</h1><p class="lead-copy" id="tournament-summary"></p><div class="d-flex flex-wrap gap-2 mt-3" id="tournament-badges"></div></section>
        <div class="row g-4">
            <div class="col-lg-8">
                <section class="content-card mb-4"><h2 class="section-title">Draw</h2><div class="d-grid gap-3" id="tournament-draw"></div></section>
                <section class="content-card"><h2 class="section-title">Matches</h2><div class="d-grid gap-3" id="tournament-matches"></div></section>
            </div>
            <div class="col-lg-4">
                <section class="content-card mb-4"><h2 class="section-title">Champions</h2><div class="d-grid gap-3" id="tournament-champions"></div></section>
                <section class="content-card"><h2 class="section-title">Tournament news</h2><div class="d-grid gap-3" id="tournament-news"></div></section>
            </div>
        </div>
    </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
